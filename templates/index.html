<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Banco C012</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #f2f4f8;
      }

      .topbar {
        background: #4f46e5;
        color: white;
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
      }

      .center {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.1);
        width: 350px;
      }

      .container {
        width: 400px;
        margin: 40px auto;
        display: none;
      }

      input,
      select {
        width: 100%;
        padding: 12px 14px;
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
      }

      button {
        padding: 15px;
        margin-top: 15px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      .log {
        background: black;
        color: #00ff9c;
        padding: 15px;
        height: 250px;
        overflow: auto;
        font-family: monospace;
        border-radius: 10px;
      }

      .saldo {
        font-size: 32px;
        font-weight: bold;
      }

      .negativo {
        color: red;
      }

      .alerta {
        display: none;
        background: #fee2e2;
        color: #991b1b;
        padding: 15px;
        margin-top: 15px;
        border-radius: 10px;
        font-weight: bold;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <!-- LOGIN -->
    <div id="loginScreen" class="center">
      <div class="card">
        <h2>Bem vindo ao Banco de C012</h2>
        Digite o saldo inicial
        <input
          id="saldoInicialLogin"
          type="number"
          step="0.01"
          placeholder="0.00"
        />
        <button onclick="entrar()">Entrar</button>
      </div>
    </div>

    <!-- BANCO -->
    <div id="bankScreen">
      <div class="topbar">Banco C012</div>

      <div class="container" id="bankContainer">
        <div class="card">
          Saldo Atual
          <div id="saldoBox" class="saldo">R$ 0.00</div>

          <div id="tempoBox" style="margin-top: 10px; font-weight: bold"></div>

          <div id="alerta" class="alerta">
            ⚠️ SISTEMA BURLADO — SALDO NEGATIVO
          </div>
        </div>

        <div class="card">
          <!-- 🔥 NOVO: CENÁRIOS -->
          Escolha o cenário
          <select id="cenario">
            <option value="cenario1">Cenário 1 (500, 350, 175, 100)</option>
            <option value="cenario2">Cenário 2 (100, 200, 300, 400, 50)</option>
            <option value="cenario3">Cenário 3 (800, 50, 60, 70, 1000)</option>
          </select>

          Algoritmo
          <select id="algoritmo">
            <option value="fcfs">FCFS</option>
            <option value="sjf">SJF</option>
            <option value="ps">Prioridade</option>
          </select>

          Usar Lock
          <select id="lock">
            <option value="true">Sim (Seguro)</option>
            <option value="false">Não (Vulnerável)</option>
          </select>

          <button onclick="executar()">Executar Simulação</button>

          <button onclick="resetar()" style="background: #dc2626">
            Resetar Sistema
          </button>
        </div>

        <div class="card">
          Logs
          <div id="log" class="log"></div>
        </div>
      </div>
    </div>

    <script>
      let saldoAtualGlobal = 0;

      function entrar() {
        saldoAtualGlobal = parseFloat(
          document.getElementById("saldoInicialLogin").value,
        );

        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("bankContainer").style.display = "block";

        document.getElementById("saldoBox").innerText =
          "R$ " + saldoAtualGlobal.toFixed(2);
      }

      async function executar() {
        let algoritmo = document.getElementById("algoritmo").value;
        let usarLock = document.getElementById("lock").value === "true";
        let cenario = document.getElementById("cenario").value;

        let res = await fetch("/executar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            saldo: saldoAtualGlobal,
            cenario: cenario,
            algoritmo: algoritmo,
            lock: usarLock,
          }),
        });

        let data = await res.json();

        document.getElementById("log").innerText =
          "Cenário: " +
          cenario.toUpperCase() +
          "\nAlgoritmo: " +
          algoritmo.toUpperCase() +
          "\nLock: " +
          (usarLock ? "ATIVO" : "DESATIVADO") +
          "\n==============================\n\n" +
          data.logs.join("\n") +
          "\n\n==============================\n" +
          "⏱ Tempo total: " +
          data.tempo_execucao +
          "s";

        document.getElementById("tempoBox").innerText =
          "⏱ Tempo: " + data.tempo_execucao + "s";

        let saldoFinal = data.saldo_final;
        saldoAtualGlobal = saldoFinal;

        let box = document.getElementById("saldoBox");
        let alerta = document.getElementById("alerta");

        box.innerText = "R$ " + saldoFinal.toFixed(2);

        if (saldoFinal < 0) {
          box.classList.add("negativo");
          alerta.style.display = "block";
        } else {
          box.classList.remove("negativo");
          alerta.style.display = "none";
        }
      }

      function resetar() {
        location.reload();
      }
    </script>
  </body>
</html>
